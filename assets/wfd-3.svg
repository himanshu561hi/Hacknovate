<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" style="width:100%;max-width:820px;background:#0d1117;border:1px solid #30363d;border-radius:8px;display:block;margin:16px 0;">
  <defs>
    <marker id="w3a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="w3g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="w3r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f85149"/>
    </marker>
  </defs>
  <text x="410" y="22" text-anchor="middle" fill="#58a6ff" font-size="13" font-family="monospace" font-weight="bold">Backend Request Processing Workflow</text>
  <!-- Request flow -->
  <rect x="20" y="50" width="100" height="36" rx="5" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="70" y="73" text-anchor="middle" fill="#58a6ff" font-size="10" font-family="monospace">HTTP Request</text>
  <line x1="120" y1="68" x2="148" y2="68" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#w3a)"/>
  <rect x="150" y="50" width="90" height="36" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="195" y="68" text-anchor="middle" fill="#3fb950" font-size="10" font-family="monospace">CORS Check</text>
  <text x="195" y="80" text-anchor="middle" fill="#8b949e" font-size="9" font-family="monospace">Origin whitelist</text>
  <!-- CORS fail -->
  <line x1="195" y1="86" x2="195" y2="120" stroke="#f85149" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#w3r)"/>
  <text x="205" y="108" fill="#f85149" font-size="9" font-family="monospace">403 fail</text>
  <line x1="240" y1="68" x2="268" y2="68" stroke="#3fb950" stroke-width="1.5" marker-end="url(#w3g)"/>
  <rect x="270" y="50" width="90" height="36" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="315" y="68" text-anchor="middle" fill="#3fb950" font-size="10" font-family="monospace">authMiddleware</text>
  <text x="315" y="80" text-anchor="middle" fill="#8b949e" font-size="9" font-family="monospace">JWT Verify</text>
  <!-- Auth fail -->
  <line x1="315" y1="86" x2="315" y2="120" stroke="#f85149" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#w3r)"/>
  <text x="325" y="108" fill="#f85149" font-size="9" font-family="monospace">401 fail</text>
  <line x1="360" y1="68" x2="388" y2="68" stroke="#3fb950" stroke-width="1.5" marker-end="url(#w3g)"/>
  <rect x="390" y="50" width="90" height="36" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="435" y="68" text-anchor="middle" fill="#3fb950" font-size="10" font-family="monospace">roleMiddleware</text>
  <text x="435" y="80" text-anchor="middle" fill="#8b949e" font-size="9" font-family="monospace">Role Check</text>
  <!-- Role fail -->
  <line x1="435" y1="86" x2="435" y2="120" stroke="#f85149" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#w3r)"/>
  <text x="445" y="108" fill="#f85149" font-size="9" font-family="monospace">403 fail</text>
  <line x1="480" y1="68" x2="508" y2="68" stroke="#3fb950" stroke-width="1.5" marker-end="url(#w3g)"/>
  <rect x="510" y="50" width="90" height="36" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="555" y="68" text-anchor="middle" fill="#3fb950" font-size="10" font-family="monospace">Controller</text>
  <text x="555" y="80" text-anchor="middle" fill="#8b949e" font-size="9" font-family="monospace">Business Logic</text>
  <!-- Controller branches -->
  <line x1="555" y1="86" x2="430" y2="160" stroke="#3fb950" stroke-width="1.5" marker-end="url(#w3g)"/>
  <line x1="555" y1="86" x2="680" y2="160" stroke="#3fb950" stroke-width="1.5" marker-end="url(#w3g)"/>
  <text x="470" y="130" fill="#8b949e" font-size="9" font-family="monospace">DB only</text>
  <text x="640" y="130" fill="#8b949e" font-size="9" font-family="monospace">AI needed</text>
  <!-- Mongoose path -->
  <rect x="340" y="162" width="180" height="36" rx="5" fill="#161b22" stroke="#ffa657" stroke-width="1.5"/>
  <text x="430" y="180" text-anchor="middle" fill="#ffa657" font-size="10" font-family="monospace">Mongoose → MongoDB</text>
  <text x="430" y="192" text-anchor="middle" fill="#8b949e" font-size="9" font-family="monospace">Query + validate</text>
  <!-- AI path -->
  <rect x="540" y="162" width="180" height="36" rx="5" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="630" y="180" text-anchor="middle" fill="#d2a8ff" font-size="10" font-family="monospace">aiService → FastAPI</text>
  <text x="630" y="192" text-anchor="middle" fill="#8b949e" font-size="9" font-family="monospace">HTTP POST :8000</text>
  <!-- Both → response -->
  <line x1="430" y1="198" x2="555" y2="240" stroke="#3fb950" stroke-width="1.5" marker-end="url(#w3g)"/>
  <line x1="630" y1="198" x2="555" y2="240" stroke="#d2a8ff" stroke-width="1.5" marker-end="url(#w3a)"/>
  <rect x="460" y="242" width="190" height="36" rx="5" fill="#1a3a2a" stroke="#3fb950" stroke-width="1.5"/>
  <text x="555" y="260" text-anchor="middle" fill="#3fb950" font-size="10" font-family="monospace">JSON Response → Client</text>
  <text x="555" y="272" text-anchor="middle" fill="#8b949e" font-size="9" font-family="monospace">200 / 201 / 400 / 404 / 500</text>
</svg>