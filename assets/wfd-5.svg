<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 320" style="width:100%;max-width:860px;background:#0d1117;border:1px solid #30363d;border-radius:8px;display:block;margin:16px 0;">
  <defs>
    <marker id="w5a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="w5g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="w5o" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffa657"/>
    </marker>
    <marker id="w5p" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d2a8ff"/>
    </marker>
  </defs>
  <text x="430" y="22" text-anchor="middle" fill="#58a6ff" font-size="13" font-family="monospace" font-weight="bold">AI Service Data Processing Workflow</text>
  <!-- Entry -->
  <rect x="20" y="50" width="140" height="36" rx="5" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="90" y="68" text-anchor="middle" fill="#58a6ff" font-size="10" font-family="monospace">Node.js HTTP Request</text>
  <text x="90" y="80" text-anchor="middle" fill="#8b949e" font-size="9" font-family="monospace">POST to :8000</text>
  <line x1="160" y1="68" x2="188" y2="68" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#w5a)"/>
  <rect x="190" y="50" width="130" height="36" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="255" y="68" text-anchor="middle" fill="#3fb950" font-size="10" font-family="monospace">FastAPI + Pydantic</text>
  <text x="255" y="80" text-anchor="middle" fill="#8b949e" font-size="9" font-family="monospace">Validate request body</text>
  <!-- Branch by endpoint -->
  <line x1="255" y1="86" x2="255" y2="120" stroke="#3fb950" stroke-width="1.5" marker-end="url(#w5g)"/>
  <text x="265" y="108" fill="#8b949e" font-size="9" font-family="monospace">route to endpoint</text>
  <!-- 5 endpoint columns -->
  <rect x="20" y="140" width="130" height="44" rx="5" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="85" y="158" text-anchor="middle" fill="#d2a8ff" font-size="10" font-family="monospace">/mastery/update</text>
  <text x="85" y="174" text-anchor="middle" fill="#8b949e" font-size="9" font-family="monospace">BKT posterior</text>
  <rect x="170" y="140" width="130" height="44" rx="5" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="235" y="158" text-anchor="middle" fill="#d2a8ff" font-size="10" font-family="monospace">/recommend</text>
  <text x="235" y="174" text-anchor="middle" fill="#8b949e" font-size="9" font-family="monospace">Skill scoring</text>
  <rect x="320" y="140" width="130" height="44" rx="5" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="385" y="158" text-anchor="middle" fill="#d2a8ff" font-size="10" font-family="monospace">/knowledge-graph</text>
  <text x="385" y="174" text-anchor="middle" fill="#8b949e" font-size="9" font-family="monospace">NetworkX DAG</text>
  <rect x="470" y="140" width="130" height="44" rx="5" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="535" y="158" text-anchor="middle" fill="#d2a8ff" font-size="10" font-family="monospace">/plan/generate</text>
  <text x="535" y="174" text-anchor="middle" fill="#8b949e" font-size="9" font-family="monospace">Topo sort + gaps</text>
  <rect x="620" y="140" width="130" height="44" rx="5" fill="#161b22" stroke="#ffa657" stroke-width="1.5"/>
  <text x="685" y="158" text-anchor="middle" fill="#ffa657" font-size="10" font-family="monospace">/tutor/query</text>
  <text x="685" y="174" text-anchor="middle" fill="#8b949e" font-size="9" font-family="monospace">Gemini SSE stream</text>
  <!-- Arrows from FastAPI to endpoints -->
  <line x1="255" y1="120" x2="85" y2="138" stroke="#3fb950" stroke-width="1.5" marker-end="url(#w5g)"/>
  <line x1="255" y1="120" x2="235" y2="138" stroke="#3fb950" stroke-width="1.5" marker-end="url(#w5g)"/>
  <line x1="255" y1="120" x2="385" y2="138" stroke="#3fb950" stroke-width="1.5" marker-end="url(#w5g)"/>
  <line x1="255" y1="120" x2="535" y2="138" stroke="#3fb950" stroke-width="1.5" marker-end="url(#w5g)"/>
  <line x1="255" y1="120" x2="685" y2="138" stroke="#3fb950" stroke-width="1.5" marker-end="url(#w5g)"/>
  <!-- All → MongoDB -->
  <line x1="85" y1="184" x2="300" y2="250" stroke="#ffa657" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#w5o)"/>
  <line x1="235" y1="184" x2="330" y2="250" stroke="#ffa657" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#w5o)"/>
  <line x1="385" y1="184" x2="360" y2="250" stroke="#ffa657" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#w5o)"/>
  <line x1="535" y1="184" x2="390" y2="250" stroke="#ffa657" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#w5o)"/>
  <rect x="280" y="252" width="140" height="36" rx="5" fill="#161b22" stroke="#ffa657" stroke-width="1.5"/>
  <text x="350" y="270" text-anchor="middle" fill="#ffa657" font-size="10" font-family="monospace">🍃 MongoDB Atlas</text>
  <text x="350" y="282" text-anchor="middle" fill="#8b949e" font-size="9" font-family="monospace">PyMongo read/write</text>
  <!-- Tutor → Gemini -->
  <line x1="685" y1="184" x2="760" y2="250" stroke="#ffa657" stroke-width="1.5" marker-end="url(#w5o)"/>
  <rect x="700" y="252" width="140" height="36" rx="5" fill="#161b22" stroke="#ffa657" stroke-width="1.5"/>
  <text x="770" y="270" text-anchor="middle" fill="#ffa657" font-size="10" font-family="monospace">🤖 Gemini Pro</text>
  <text x="770" y="282" text-anchor="middle" fill="#8b949e" font-size="9" font-family="monospace">SSE stream → Node.js</text>
</svg>