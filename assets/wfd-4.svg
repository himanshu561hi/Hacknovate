<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 260" style="width:100%;max-width:820px;background:#0d1117;border:1px solid #30363d;border-radius:8px;display:block;margin:16px 0;">
  <defs>
    <marker id="w4a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="w4g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="w4o" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffa657"/>
    </marker>
  </defs>
  <text x="410" y="22" text-anchor="middle" fill="#58a6ff" font-size="13" font-family="monospace" font-weight="bold">Notification Workflow</text>
  <!-- Trigger events -->
  <rect x="20" y="40" width="130" height="36" rx="5" fill="#161b22" stroke="#ffa657" stroke-width="1.5"/>
  <text x="85" y="58" text-anchor="middle" fill="#ffa657" font-size="10" font-family="monospace">Triggering Event</text>
  <text x="85" y="70" text-anchor="middle" fill="#8b949e" font-size="9" font-family="monospace">Burnout / Level / Assign</text>
  <line x1="150" y1="58" x2="188" y2="58" stroke="#ffa657" stroke-width="1.5" marker-end="url(#w4o)"/>
  <rect x="190" y="40" width="160" height="36" rx="5" fill="#161b22" stroke="#ffa657" stroke-width="1.5"/>
  <text x="270" y="58" text-anchor="middle" fill="#ffa657" font-size="10" font-family="monospace">notificationController</text>
  <text x="270" y="70" text-anchor="middle" fill="#8b949e" font-size="9" font-family="monospace">Creates Notification doc</text>
  <line x1="350" y1="58" x2="388" y2="58" stroke="#ffa657" stroke-width="1.5" marker-end="url(#w4o)"/>
  <rect x="390" y="40" width="130" height="36" rx="5" fill="#161b22" stroke="#ffa657" stroke-width="1.5"/>
  <text x="455" y="58" text-anchor="middle" fill="#ffa657" font-size="10" font-family="monospace">Stored in MongoDB</text>
  <text x="455" y="70" text-anchor="middle" fill="#8b949e" font-size="9" font-family="monospace">Notification collection</text>
  <!-- Branch: email or in-app -->
  <line x1="455" y1="76" x2="340" y2="130" stroke="#ffa657" stroke-width="1.5" marker-end="url(#w4o)"/>
  <line x1="455" y1="76" x2="570" y2="130" stroke="#ffa657" stroke-width="1.5" marker-end="url(#w4o)"/>
  <text x="370" y="110" fill="#8b949e" font-size="9" font-family="monospace">email required</text>
  <text x="540" y="110" fill="#8b949e" font-size="9" font-family="monospace">in-app only</text>
  <!-- Email path -->
  <rect x="220" y="132" width="160" height="36" rx="5" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="300" y="150" text-anchor="middle" fill="#58a6ff" font-size="10" font-family="monospace">sendEmail.js</text>
  <text x="300" y="162" text-anchor="middle" fill="#8b949e" font-size="9" font-family="monospace">Nodemailer → Gmail SMTP</text>
  <line x1="300" y1="168" x2="300" y2="200" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#w4a)"/>
  <rect x="220" y="202" width="160" height="36" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="300" y="220" text-anchor="middle" fill="#3fb950" font-size="10" font-family="monospace">Email Delivered</text>
  <text x="300" y="232" text-anchor="middle" fill="#8b949e" font-size="9" font-family="monospace">Student inbox</text>
  <!-- In-app path -->
  <rect x="460" y="132" width="160" height="36" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="540" y="150" text-anchor="middle" fill="#3fb950" font-size="10" font-family="monospace">Frontend Polls</text>
  <text x="540" y="162" text-anchor="middle" fill="#8b949e" font-size="9" font-family="monospace">GET /api/notifications</text>
  <line x1="540" y1="168" x2="540" y2="200" stroke="#3fb950" stroke-width="1.5" marker-end="url(#w4g)"/>
  <rect x="460" y="202" width="160" height="36" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="540" y="220" text-anchor="middle" fill="#3fb950" font-size="10" font-family="monospace">Unread Badge Shown</text>
  <text x="540" y="232" text-anchor="middle" fill="#8b949e" font-size="9" font-family="monospace">Navbar badge count</text>
</svg>